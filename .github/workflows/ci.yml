name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio types-PyYAML

      - name: Ruff lint
        run: ruff check . --ignore RUF001,RUF002,RUF003

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict
        run: mypy src main.py

      - name: Pytest smoke
        run: PYTHONPATH=. pytest tests/test_search_service.py tests/test_subscription_service.py

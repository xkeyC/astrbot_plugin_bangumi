name: Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # 安装 astrbot 以满足导入需求（如果 requirements.txt 中没有）
        pip install astrbot

    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        # 运行所有测试，排除需要本地 Playwright 环境的渲染测试（或者仅运行 Mock 测试）
        # 这里运行我们新写的 Mock 测试作为冒烟测试
        pytest tests/test_search_service.py tests/test_subscription_service.py
